    <main class="flex-1 max-w-6xl w-full mx-auto p-6 flex flex-col gap-6 overflow-hidden">

        <!-- SEO friendly intro: brief, keyword-rich description for users and search engines -->
        <div class="bg-gray-800 rounded-2xl p-6 border border-gray-700 text-gray-200">
            <h2 class="text-lg font-semibold mb-2">移除 Gemini、NotebookLM 圖片浮水印</h2>
            <p class="text-sm text-gray-300">本工具由 Rico技術學院 提供，專注於移除gemini浮水印、移除notebooklm浮水印 。操作簡單、下載方便。</p>
        </div>

        <div id="uploadWrapper" class="transition-all duration-500">
            <div id="dropZone" class="bg-gray-800 border-2 border-dashed border-gray-600 rounded-2xl p-8 sm:p-12 text-center hover:border-indigo-500 hover:bg-gray-700/50 transition-all cursor-pointer group">
                <input type="file" id="fileInput" accept="image/png, image/jpeg" class="hidden">
                <div class="bg-gray-900 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                    <i data-lucide="image-plus" class="w-8 h-8 text-indigo-400"></i>
                </div>
                <h2 class="text-xl font-semibold mb-2">上傳圖片</h2>
            </div>
        </div>

        <div id="processWrapper" class="hidden flex flex-col items-center gap-4">
            <div class="flex flex-wrap justify-center items-center gap-3 bg-gray-800 p-3 rounded-2xl border border-gray-700 shadow-xl">
                <label for="engineSelect" class="pl-4 text-sm font-semibold text-gray-400">修復模式：</label>
                <select id="engineSelect" class="bg-gray-700 text-white px-4 py-2 pr-10 rounded-xl border-none focus:ring-2 focus:ring-indigo-500 font-medium cursor-pointer appearance-none">
                    <option value="notebooklm_precision">NotebookLM </option>
                    <option value="gemini_sparkle">Google Gemini </option>
                </select>
                <button id="processBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-2 rounded-xl font-bold shadow-lg transition-all flex items-center gap-2 active:scale-95">
                    <i data-lucide="wand" class="w-5 h-5"></i> 執行修復
                </button>
            </div>
        </div>

        <div id="previewWrapper" class="hidden flex-1 flex flex-col md:flex-row gap-4 min-h-0">

                <div class="bg-gray-700/50 px-4 py-2 text-xs font-medium text-gray-300 flex justify-between uppercase">
                    原始圖片
                </div>
                <div id="srcContainer" class="flex-1 overflow-auto canvas-container bg-black/40 relative p-4 flex items-center justify-center">
                    <canvas id="srcCanvas" class="checkerboard w-full h-auto shadow-2xl"></canvas>
                </div>
            </div>

            <div class="flex-1 flex flex-col min-w-0 bg-gray-800 rounded-xl overflow-hidden border border-gray-700">
                <div class="bg-gray-700/50 px-4 py-2 text-xs font-medium text-gray-300 flex justify-between uppercase">
                    修復結果

                <div id="destContainer" class="flex-1 overflow-auto canvas-container bg-black/40 relative p-4 flex items-center justify-center">
                    <canvas id="destCanvas" class="checkerboard w-full h-auto shadow-2xl"></canvas>
